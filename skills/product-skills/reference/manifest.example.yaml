# Образец манифеста сервисов для скилла system-map.
# Скопируйте в рабочий каталог анализа как product/manifest.yaml и поправьте пути.
# (Скилл /product-skills --init создаёт этот файл за вас.)
#
# Поля сервиса:
#   name  — короткое имя (используется в ID файлов и графе зависимостей)
#   path  — АБСОЛЮТНЫЙ путь к локальной папке сервиса (репозиторий = просто папка)
#   type  — backend | frontend | fullstack | lib   (frontend/fullstack → попадут в UI-аудит impeccable)
#   repo  — опционально, URL репозитория (для справки)

services:
  - name: orders
    path: /abs/path/orders
    type: backend
    repo: git@example.com:team/orders.git

  - name: payments
    path: /abs/path/payments
    type: backend

  - name: notifications
    path: /abs/path/notifications
    type: backend

  - name: web
    path: /abs/path/web
    type: frontend

  - name: admin-ui
    path: /abs/path/admin-ui
    type: frontend

  - name: shared-lib
    path: /abs/path/shared-lib
    type: lib
